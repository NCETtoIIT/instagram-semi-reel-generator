name: 🎬 Daily Reel Preparation

on:
  schedule:
    - cron: '30 21 * * *'  # 21:30 UTC = 3:00 AM IST (daily)
  workflow_dispatch:       # Manual trigger button

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # To push dashboard updates back to repo
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install Dependencies
        run: npm ci
      
      - name: Create .env File
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
          echo "ABOUT_ME_PATH=./about_me.md" >> .env
      
      - name: Run Generator Pipeline
        run: npm start
      
      - name: Commit and Push Changes
        run: |
          git config --global user.name "Reel Dashboard Bot"
          git config --global user.email "bot@reels.local"
          git add docs/ data/
          git diff --quiet && git diff --staged --quiet || (git commit -m "📊 Dashboard Update: $(date +'%Y-%m-%d')" && git push)
